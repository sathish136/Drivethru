packages:
  "recharts": "Dashboard analytics charts and data visualization"
  "date-fns": "Human-readable date formatting and manipulation"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "lucide-react": "Beautiful consistent icons for the UI"

images:
  - path: "artifacts/attendance/public/images/logo.png"
    description: "Minimal modern geometric post office logo mark in vibrant green on transparent background"
    aspect_ratio: "1:1"

notes:
  - API hooks are imported directly from the generated @workspace/api-client-react package.
  - Orval generates mutation hooks expecting `{ data: Payload }`.
  - The UI is designed for a dense, data-rich HRMS experience with a green primary theme.
