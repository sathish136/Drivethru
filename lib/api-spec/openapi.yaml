openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Post Office Attendance Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: employees
    description: Employee management
  - name: branches
    description: Branch management
  - name: shifts
    description: Shift management
  - name: attendance
    description: Attendance records
  - name: reports
    description: Reports
  - name: biometric
    description: Biometric device management
  - name: users
    description: User management
  - name: settings
    description: System settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"

  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List all branches
      parameters:
        - name: parentId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [head_office, regional, sub_branch]
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

  /branches/{id}:
    get:
      operationId: getBranch
      tags: [branches]
      summary: Get branch by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Branch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
    put:
      operationId: updateBranch
      tags: [branches]
      summary: Update branch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "200":
          description: Updated branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
    delete:
      operationId: deleteBranch
      tags: [branches]
      summary: Delete branch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Employee list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    put:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /shifts:
    get:
      operationId: listShifts
      tags: [shifts]
      summary: List shifts
      responses:
        "200":
          description: Shift list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    post:
      operationId: createShift
      tags: [shifts]
      summary: Create shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftRequest"
      responses:
        "201":
          description: Created shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/{id}:
    put:
      operationId: updateShift
      tags: [shifts]
      summary: Update shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShiftRequest"
      responses:
        "200":
          description: Updated shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"
    delete:
      operationId: deleteShift
      tags: [shifts]
      summary: Delete shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /employee-shifts:
    post:
      operationId: assignShift
      tags: [shifts]
      summary: Assign shift to employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignShiftRequest"
      responses:
        "201":
          description: Shift assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeShift"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [present, absent, late, half_day, holiday, leave]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceListResponse"
    post:
      operationId: createAttendance
      tags: [attendance]
      summary: Create/update attendance record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendanceRequest"
      responses:
        "201":
          description: Attendance saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    put:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendanceRequest"
      responses:
        "200":
          description: Updated attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/today:
    get:
      operationId: getTodayAttendance
      tags: [attendance]
      summary: Get today's attendance summary
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Today attendance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayAttendanceSummary"

  /attendance/monthly-sheet:
    get:
      operationId: getMonthlySheet
      tags: [attendance]
      summary: Get monthly attendance sheet
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly attendance sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySheetResponse"

  /attendance/punch:
    post:
      operationId: punchAttendance
      tags: [attendance]
      summary: Manual punch in/out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PunchRequest"
      responses:
        "200":
          description: Punch recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /reports/attendance:
    get:
      operationId: getAttendanceReport
      tags: [reports]
      summary: Attendance report
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: integer
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReport"

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Monthly attendance report
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"

  /reports/overtime:
    get:
      operationId: getOvertimeReport
      tags: [reports]
      summary: Overtime report
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Overtime report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvertimeReport"

  /reports/summary:
    get:
      operationId: getDashboardSummary
      tags: [reports]
      summary: Dashboard summary stats
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /biometric/devices:
    get:
      operationId: listBiometricDevices
      tags: [biometric]
      summary: List biometric devices
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BiometricDevice"
    post:
      operationId: createBiometricDevice
      tags: [biometric]
      summary: Add biometric device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBiometricDeviceRequest"
      responses:
        "201":
          description: Device added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricDevice"

  /biometric/devices/{id}:
    put:
      operationId: updateBiometricDevice
      tags: [biometric]
      summary: Update biometric device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBiometricDeviceRequest"
      responses:
        "200":
          description: Updated device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricDevice"
    delete:
      operationId: deleteBiometricDevice
      tags: [biometric]
      summary: Delete biometric device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /biometric/devices/{id}/test:
    post:
      operationId: testBiometricDevice
      tags: [biometric]
      summary: Test biometric device connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceTestResult"

  /biometric/logs:
    get:
      operationId: listBiometricLogs
      tags: [biometric]
      summary: List biometric push logs
      parameters:
        - name: deviceId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Biometric logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricLogListResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List system users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create system user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get system settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"

  /holidays:
    get:
      operationId: listHolidays
      tags: [settings]
      summary: List holidays
      parameters:
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Holiday"
    post:
      operationId: createHoliday
      tags: [settings]
      summary: Create holiday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHolidayRequest"
      responses:
        "201":
          description: Created holiday
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holiday"

  /holidays/{id}:
    delete:
      operationId: deleteHoliday
      tags: [settings]
      summary: Delete holiday
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
        success:
          type: boolean
      required: [message, success]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/CurrentUser"
        token:
          type: string
      required: [user, token]

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_admin, regional_admin, branch_admin, viewer]
        branchIds:
          type: array
          items:
            type: integer
        branchNames:
          type: array
          items:
            type: string
        isActive:
          type: boolean
      required: [id, username, fullName, email, role, branchIds, branchNames, isActive]

    Branch:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum: [head_office, regional, sub_branch]
        parentId:
          type: integer
          nullable: true
        parentName:
          type: string
          nullable: true
        address:
          type: string
        phone:
          type: string
        managerName:
          type: string
        employeeCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, code, type, isActive, createdAt, employeeCount]

    CreateBranchRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum: [head_office, regional, sub_branch]
        parentId:
          type: integer
          nullable: true
        address:
          type: string
        phone:
          type: string
        managerName:
          type: string
        isActive:
          type: boolean
      required: [name, code, type, isActive]

    Employee:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: string
        fullName:
          type: string
        designation:
          type: string
        department:
          type: string
        branchId:
          type: integer
        branchName:
          type: string
        shiftId:
          type: integer
          nullable: true
        shiftName:
          type: string
          nullable: true
        joiningDate:
          type: string
        email:
          type: string
        phone:
          type: string
        biometricId:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
      required: [id, employeeId, fullName, designation, department, branchId, branchName, joiningDate, email, phone, status, createdAt]

    EmployeeListResponse:
      type: object
      properties:
        employees:
          type: array
          items:
            $ref: "#/components/schemas/Employee"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [employees, total, page, limit]

    CreateEmployeeRequest:
      type: object
      properties:
        employeeId:
          type: string
        fullName:
          type: string
        designation:
          type: string
        department:
          type: string
        branchId:
          type: integer
        shiftId:
          type: integer
          nullable: true
        joiningDate:
          type: string
        email:
          type: string
        phone:
          type: string
        biometricId:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
      required: [employeeId, fullName, designation, department, branchId, joiningDate, email, phone, status]

    Shift:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [normal, split]
        startTime1:
          type: string
        endTime1:
          type: string
        startTime2:
          type: string
          nullable: true
        endTime2:
          type: string
          nullable: true
        totalHours:
          type: number
        graceMinutes:
          type: integer
        overtimeThreshold:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, type, startTime1, endTime1, totalHours, graceMinutes, overtimeThreshold, isActive, createdAt]

    CreateShiftRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [normal, split]
        startTime1:
          type: string
        endTime1:
          type: string
        startTime2:
          type: string
          nullable: true
        endTime2:
          type: string
          nullable: true
        graceMinutes:
          type: integer
        overtimeThreshold:
          type: integer
        isActive:
          type: boolean
